name: Validate Skill

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate scripts
        run: |
          bash -n skills/deploy-recsys-research-radar/scripts/bootstrap_repository.sh
          bash -n skills/deploy-recsys-research-radar/scripts/deploy_feedback_worker.sh
          python -m py_compile \
            skills/deploy-recsys-research-radar/scripts/configure_repo.py \
            skills/deploy-recsys-research-radar/scripts/verify_deployment.py
      - name: Validate Skill metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('skills/deploy-recsys-research-radar/SKILL.md')
          text = path.read_text()
          assert text.startswith('---\nname: deploy-recsys-research-radar\n')
          assert '\ndescription:' in text.split('---', 2)[1]
          assert 'TODO' not in text
          assert len(text.splitlines()) < 500
          print('Skill metadata and size are valid')
          PY
